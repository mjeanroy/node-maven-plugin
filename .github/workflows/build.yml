name: Java CI

on: [push]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
        java: [ 11, 17, 19 ]
        distribution: [ 'temurin' ]
        include:
          - os: windows-latest
            java: '8'
            distribution: 'zulu'
          - os: ubuntu-latest
            java: '8'
            distribution: 'zulu'
          - os: macos-latest
            java: '8'
            distribution: 'zulu'
          - os: ubuntu-latest
            java: 7
            distribution: 'zulu'

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        allow-unsafe-pr-checkout: false

    - name: Set up JDK
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: ${{ matrix.java }}
        distribution: ${{ matrix.distribution }}
        cache: 'maven'

    - name: Set up GCS Maven Central mirror
      run: echo "<settings><mirrors><mirror><id>google-maven-central</id><name>GCS Maven Central mirror</name><url>https://maven-central.storage-download.googleapis.com/maven2/</url><mirrorOf>central</mirrorOf></mirror></mirrors></settings>" > ~/.m2/settings.xml
    - name: java -version
      run: java -version
    - name: mvn -version
      run: ./mvnw -version
    - name: Build
      run: ./mvnw -B package -DskipTests
    - name: Test
      run: ./mvnw -B verify
